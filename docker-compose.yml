version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: ems-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: ems-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/ems-database
      - PORT=5000
      - JWT_SECRET=ems_super_secret_jwt_key
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: ems-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data:
